<!doctype html>
<html lang="en" data-theme="azorius">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>SpellControl</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Eczar:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Set data-theme synchronously so the right [data-theme] CSS rules
      // apply on first paint. Mirrors bootstrapTheme() in store/theme.ts —
      // keep the storage key and id list in sync if either changes.
      (function () {
        var VALID = [
          'azorius',
          'boros',
          'dimir',
          'golgari',
          'gruul',
          'izzet',
          'orzhov',
          'rakdos',
          'selesnya',
          'simic',
        ];
        var DEFAULT = 'azorius';
        var id = DEFAULT;
        try {
          var raw = localStorage.getItem('spellcontrol-theme');
          if (raw) {
            var parsed = JSON.parse(raw);
            var saved = parsed && parsed.state && parsed.state.theme;
            if (saved && VALID.indexOf(saved) !== -1) id = saved;
          }
        } catch (e) {}
        document.documentElement.setAttribute('data-theme', id);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
