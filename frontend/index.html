<!doctype html>
<html lang="en" data-theme="azorius" data-scheme="light">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content: when the soft keyboard shows,
         shrink the layout viewport (so 100dvh / fixed bottom bars settle
         above it) instead of letting it float over the content. Matches the
         native WebView resize behavior; the keyboard layer (lib/keyboard.ts)
         publishes any residual gap as --keyboard-inset for browsers (iOS
         Safari) that don't honor this. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0a1f3d" />
    <link rel="icon" type="image/svg+xml" href="/sc-icon.svg" />
    <link rel="apple-touch-icon" href="/sc-icon.svg" />
    <title>SpellControl — Organize MTG binders, build decks &amp; track games</title>
    <meta
      name="description"
      content="Plan your physical Magic: The Gathering collection. Import from any popular tool, organize cards into rule-based binders, generate Commander decks and analyze them, and track multiplayer games."
    />
    <link rel="canonical" href="https://spellcontrol.com/" />
    <!-- Open Graph / Twitter — static homepage card. A client-rendered SPA
         can't vary these per-route without JS; these describe the root, which
         is what crawlers and link-preview bots read from the served HTML. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SpellControl" />
    <meta
      property="og:title"
      content="SpellControl — Organize MTG binders, build decks &amp; track games"
    />
    <meta
      property="og:description"
      content="Plan your physical Magic: The Gathering collection. Import, organize into rule-based binders, build decks, and track multiplayer games."
    />
    <meta property="og:url" content="https://spellcontrol.com/" />
    <meta property="og:image" content="https://spellcontrol.com/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="SpellControl — Organize MTG binders, build decks &amp; track games"
    />
    <meta
      name="twitter:description"
      content="Plan your physical Magic: The Gathering collection. Import, organize into rule-based binders, build decks, and track multiplayer games."
    />
    <meta name="twitter:image" content="https://spellcontrol.com/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Eczar:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Set data-theme + data-scheme synchronously so the right [data-theme]
      // and [data-scheme] CSS rules apply on first paint. Mirrors
      // bootstrapTheme() in store/theme.ts — keep the storage key and the
      // id→scheme map in sync with lib/themes.ts if either changes.
      // First run (nothing stored) follows the OS color scheme; a stored
      // theme always wins and we never live-switch on later OS changes.
      (function () {
        var SCHEMES = {
          azorius: 'light',
          boros: 'light',
          dimir: 'dark',
          golgari: 'dark',
          gruul: 'dark',
          izzet: 'dark',
          orzhov: 'dark',
          rakdos: 'dark',
          selesnya: 'light',
          simic: 'light',
        };
        var prefersDark = false;
        try {
          prefersDark =
            typeof window.matchMedia === 'function' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
        } catch (e) {}
        var id = prefersDark ? 'dimir' : 'azorius';
        try {
          var raw = localStorage.getItem('spellcontrol-theme');
          if (raw) {
            var parsed = JSON.parse(raw);
            var saved = parsed && parsed.state && parsed.state.theme;
            if (saved && SCHEMES.hasOwnProperty(saved)) id = saved;
          }
        } catch (e) {}
        document.documentElement.setAttribute('data-theme', id);
        document.documentElement.setAttribute('data-scheme', SCHEMES[id]);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
