upstream backend {
    server backend:3737;
}

# Per-client-IP request budget for the API. The backend's express-rate-limit
# is the precise per-endpoint control; this is a coarse edge cap so a single
# IP can't saturate the upstream before the app-layer limiter even runs.
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=apiconn:10m;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Topology: client -> Cloudflare (proxied) -> router -> Nginx Proxy
    # Manager -> host:8088 -> this container -> backend.
    #
    # The TCP peer here is always NPM (a private IP), and the X-Forwarded-For
    # chain ends in Cloudflare *edge* IPs (public) — neither is the real
    # visitor. Cloudflare sets CF-Connecting-IP to the true client and
    # overwrites any client-supplied value, so it's the only trustworthy
    # source. We accept it because the only network path to this container is
    # through NPM (a trusted private hop).
    #
    # SECURITY DEPENDENCY: CF-Connecting-IP is only unforgeable for traffic
    # that actually transited Cloudflare. If an attacker discovers the origin
    # IP and reaches NPM directly (bypassing Cloudflare), they can forge this
    # header. That is why the origin MUST be locked to Cloudflare (Tunnel, or
    # firewall the router to Cloudflare IP ranges) — see deployment notes.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header CF-Connecting-IP;

    # Clickjacking / MIME-sniffing / referrer hardening. Applied to every
    # response (static SPA included) — helmet only covers the JSON API.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Camera is required by the in-browser card scanner; deny the rest.
    add_header Permissions-Policy "geolocation=(), microphone=(), payment=()" always;
    # Safe to send even over plain HTTP (browsers ignore it there); takes
    # effect once TLS is terminated upstream.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP in Report-Only first: OCR pulls a blob worker + WASM + CDN language
    # data and index.html has an inline theme script, so an enforcing policy
    # needs real-browser validation. Observe violation reports, then promote
    # this to Content-Security-Policy.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' blob: 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.scryfall.io https://*.scryfall.com; connect-src 'self' https://api.scryfall.com https://json.edhrec.com https://*.scryfall.io https://cdn.jsdelivr.net https://unpkg.com https://tessdata.projectnaptha.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # Reverse-proxy /api/ to the backend container so the browser sees a
    # single origin. Same-origin keeps the session cookie simple (no CORS,
    # no SameSite=None gymnastics) and avoids exposing the backend port
    # publicly.
    location /api/ {
        # Edge throttle: burst absorbs legitimate bursts (page load fans out
        # several calls); nodelay serves the burst immediately rather than
        # queueing. Sustained abuse past the budget gets 503'd here before it
        # reaches the backend.
        limit_req zone=api burst=40 nodelay;
        limit_conn apiconn 20;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # $remote_addr is now the real client (set from CF-Connecting-IP by
        # real_ip above). Send it as a single clean X-Forwarded-For value and
        # OVERWRITE rather than append — appending would re-introduce the
        # client-forged / Cloudflare-edge entries that express-rate-limit
        # (trust proxy: 1) would then key on, reopening the per-IP-limiter
        # bypass (login brute-force included).
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        # Largest payloads are import uploads (multer caps at 20 MB).
        client_max_body_size 25m;
        proxy_read_timeout 180s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets, no cache for index.html
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Any add_header in a location resets inherited add_headers, so the
        # server-level set is dropped here. Frame/CSP/HSTS are irrelevant for
        # static sub-resources, but nosniff still matters (script MIME
        # confusion) — re-assert just that one.
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Use `expires` (not `add_header`) for cache control so this location does
    # NOT reset the inherited server-level security headers — index.html is
    # the document that most needs CSP / X-Frame-Options. `expires -1` emits
    # `Cache-Control: no-cache`.
    location = /index.html {
        expires -1;
    }
}
