server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy /api/ to the backend container so the browser sees a
    # single origin. Same-origin keeps the session cookie simple (no CORS,
    # no SameSite=None gymnastics) and avoids exposing the backend port
    # publicly.
    location /api/ {
        proxy_pass http://backend:3737;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Largest payloads are import uploads (multer caps at 20 MB).
        client_max_body_size 25m;
        proxy_read_timeout 180s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets, no cache for index.html
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
