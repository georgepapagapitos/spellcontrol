name: Scanner Ingest

# Nightly refresh of the camera scanner's reference data:
#   - backend/data/scanner/card-hashes.bin    (pHash DB, ~1.2 MB)
#   - backend/data/scanner/card-embeddings.bin (MobileCLIP DB, ~26 MB)
#   - frontend/public/scanner/card-hashes.bin (offline-fallback mirror)
#
# The job downloads Scryfall's unique_artwork bulk dataset, recomputes
# perceptual hashes and MobileCLIP2-S0 embeddings for every printing, and
# opens a PR with the regenerated artifacts. Merging the PR rebuilds the
# backend Docker image (Dockerfile COPYs backend/data/scanner/) so the
# server-side matcher picks up new sets on the next Fly deploy.
#
# Why a PR and not a direct push: it runs the regenerated binaries through
# the required CI checks before they hit main (a direct push would land
# them unchecked), keeps `main` protected, and leaves an auditable record
# of each refresh (size delta, record counts). The PR auto-merges once CI
# is green — there is nothing in three opaque binaries for a human to
# review, so we keep the gate without the manual click (see the
# "Enable auto-merge" step). Manual `workflow_dispatch` lets us refresh on
# demand right after a major set release without waiting for the cron.

on:
  schedule:
    # 04:00 UTC on the 1st and 15th of each month (~biweekly). The scanner's
    # reference data only changes when new MTG printings exist (a set /
    # Commander deck / Secret Lair drop — roughly monthly), so a nightly
    # recompute of the entire embedding corpus (~1-2h CPU) was almost pure
    # waste and the dominant consumer of our private-repo Actions quota.
    # Twice-monthly keeps the scanner at most ~2 weeks behind a brand-new set;
    # fire `workflow_dispatch` manually the day a big set drops to refresh on
    # demand without waiting. (GitHub cron can't express a true 14-day cycle;
    # the 1st/15th is the standard ~biweekly approximation.) 04:00 UTC is well
    # after Scryfall's daily bulk regeneration (~10:00 UTC the prior day) and
    # clear of the combo ingest.
    - cron: '0 4 1,15 * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Optional --limit for dev runs (omit for full ingest)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    name: Refresh scanner reference DBs
    runs-on: ubuntu-latest
    # Allow plenty of headroom — full embedding ingest is ~1-2h CPU.
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Build the shared file: deps BEFORE the consumer's npm ci. Their dist
      # is gitignored, so a fresh checkout has none; building here makes the
      # dist-guarded `prepare` a no-op when backend installs. If backend's
      # `npm ci` ran first it would trigger binder-routing's build with no
      # devDeps installed → TS2688 "Cannot find type definition file for
      # 'node'". (Mirrors the ordering in ci.yml's frontend job.)
      - name: Build shared packages
        run: |
          npm --prefix packages/game-core ci --ignore-scripts
          npm --prefix packages/game-core run build
          npm --prefix packages/binder-routing ci --ignore-scripts
          npm --prefix packages/binder-routing run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Ingest pHashes
        working-directory: backend
        env:
          LIMIT: ${{ inputs.limit }}
        run: |
          if [[ -n "$LIMIT" ]]; then
            # Validate: only positive integers are allowed through to the CLI.
            if [[ ! "$LIMIT" =~ ^[0-9]+$ ]]; then
              echo "::error::limit must be a positive integer; got '$LIMIT'" >&2
              exit 1
            fi
            npx tsx src/scripts/ingest-card-hashes.ts --limit "$LIMIT"
          else
            npx tsx src/scripts/ingest-card-hashes.ts
          fi

      - name: Ingest embeddings
        working-directory: backend
        env:
          LIMIT: ${{ inputs.limit }}
        run: |
          if [[ -n "$LIMIT" ]]; then
            if [[ ! "$LIMIT" =~ ^[0-9]+$ ]]; then
              echo "::error::limit must be a positive integer; got '$LIMIT'" >&2
              exit 1
            fi
            npx tsx src/scripts/ingest-card-embeddings.ts --limit "$LIMIT"
          else
            npx tsx src/scripts/ingest-card-embeddings.ts
          fi

      - name: Report sizes
        run: |
          ls -lh backend/data/scanner/ backend/data/scanner/embed/ frontend/public/scanner/

      # Mint a GitHub App installation token so the PR is created by the app,
      # not the default GITHUB_TOKEN. PRs opened with GITHUB_TOKEN do NOT
      # trigger other workflows (GitHub's anti-recursion safeguard), so the
      # required CI checks ("Frontend/Backend — typecheck & test") would never
      # run and the "protect main" ruleset would block the PR forever. An app
      # token is a non-GITHUB_TOKEN actor, so its push/PR fires CI normally.
      # Requires repo secrets SCANNER_BOT_APP_ID + SCANNER_BOT_PRIVATE_KEY
      # (a GitHub App installed on this repo with Contents + Pull requests: write).
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SCANNER_BOT_APP_ID }}
          private-key: ${{ secrets.SCANNER_BOT_PRIVATE_KEY }}

      - name: Open refresh PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: chore/scanner-ingest-refresh
          delete-branch: true
          base: main
          title: 'chore(scanner): refresh pHash + MobileCLIP DBs'
          commit-message: 'chore(scanner): refresh pHash + MobileCLIP DBs'
          add-paths: |
            backend/data/scanner/card-hashes.bin
            backend/data/scanner/card-embeddings.bin
            frontend/public/scanner/card-hashes.bin
          body: |
            Automated refresh of the scanner's reference data.

            - `backend/data/scanner/card-hashes.bin` — pHash DB used by the server matcher.
            - `backend/data/scanner/card-embeddings.bin` — MobileCLIP2-S0 embedding DB used by the server matcher.
            - `frontend/public/scanner/card-hashes.bin` — mirror for the offline pHash-only fallback.

            Merging this rebuilds the backend Docker image with new sets recognized. The Fly deploy that follows will pick them up automatically.

            > Auto-merge is enabled on this PR — it lands itself once the required CI checks go green. No manual click needed.

      # Let the PR merge itself once CI is green. The diff is three opaque
      # regenerated binaries — there is nothing for a human to review, so the
      # required status checks ("Frontend/Backend — typecheck & test") are the
      # only gate worth keeping. We use the app token (PRs:write) so GitHub
      # records the bot as the enabler. `--squash` keeps one commit per refresh.
      #
      # Strict status checks (branch-must-be-up-to-date) mean a PR can go stale
      # if another PR merges to main during the few-minute CI window; GitHub
      # will then hold the auto-merge until the branch is current. That self-
      # heals: peter-evans/create-pull-request rebases this same branch onto
      # latest main on the next nightly run, which re-arms the merge. Worst
      # case a refresh waits up to a day — acceptable for nightly reference data.
      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge --auto --squash "$PR_NUMBER"
