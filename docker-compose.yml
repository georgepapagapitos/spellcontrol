services:
  postgres:
    image: postgres:16-alpine
    container_name: spellcontrol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spellcontrol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: spellcontrol
    volumes:
      - spellcontrol-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spellcontrol -d spellcontrol']
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 256m
    cpus: 0.5

  backend:
    image: ghcr.io/georgepapagapitos/spellcontrol-backend:latest
    container_name: spellcontrol-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://spellcontrol:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/spellcontrol
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (32+ random chars)}
      NODE_ENV: production
      # Optional. Comma-separated usernames that the backend promotes to admin
      # on boot. Empty by default — set in .env to enable the admin panel.
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
      # Optional. Google "Continue with Google" SSO — all four empty by
      # default, which disables the feature cleanly. See .env.example.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OAUTH_WEB_REDIRECT_URI: ${OAUTH_WEB_REDIRECT_URI:-}
      OAUTH_NATIVE_REDIRECT_URI: ${OAUTH_NATIVE_REDIRECT_URI:-}
      # Give V8 enough old-space to slim and gzip the Scryfall oracle bulk
      # without OOM-ing. Stays well under the cgroup mem_limit so the kernel
      # never kills the process before V8 gets to recover.
      NODE_OPTIONS: --max-old-space-size=1536
    # Backend is no longer exposed to the host — the frontend container's
    # nginx proxies /api/ to it on the docker-compose network.
    expose:
      - '3737'
    volumes:
      - spellcontrol-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
    # The Scryfall oracle bulk is built lazily on first request (and refreshed
    # daily afterwards). Measured peak on the beelink is ~710MB during the
    # build while it streams in, slims, and gzips ~200MB of JSON; steady state
    # idles around 70-100MB. 1g gives ~300MB of headroom over the measured
    # peak — enough cushion for V8 GC variance and concurrent native-dep
    # allocations (better-sqlite3, pg) without being a foot-gun. Tested at
    # 768m and it ran at 92% utilization during the build, which is too close.
    mem_limit: 1g
    cpus: 0.5

  frontend:
    image: ghcr.io/georgepapagapitos/spellcontrol-frontend:latest
    container_name: spellcontrol-frontend
    restart: unless-stopped
    ports:
      - '8088:80'
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
    mem_limit: 64m
    cpus: 0.25
    depends_on:
      - backend

volumes:
  spellcontrol-data:
  spellcontrol-postgres:
