services:
  backend:
    build: ./backend
    container_name: binder-backend
    restart: unless-stopped
    ports:
      - "3737:3737"
    volumes:
      - binder-data:/data
    mem_limit: 256m
    cpus: 0.5

  frontend:
    build: ./frontend
    container_name: binder-frontend
    restart: unless-stopped
    ports:
      - "8088:80"
    mem_limit: 64m
    cpus: 0.25
    depends_on:
      - backend

volumes:
  binder-data:
