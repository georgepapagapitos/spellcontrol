services:
  backend:
    image: ghcr.io/georgepapagapitos/mtg-binder-backend:latest
    container_name: binder-backend
    restart: unless-stopped
    ports:
      - "3737:3737"
    volumes:
      - binder-data:/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    mem_limit: 256m
    cpus: 0.5

  frontend:
    image: ghcr.io/georgepapagapitos/mtg-binder-frontend:latest
    container_name: binder-frontend
    restart: unless-stopped
    ports:
      - "8088:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    mem_limit: 64m
    cpus: 0.25
    depends_on:
      - backend

volumes:
  binder-data:
