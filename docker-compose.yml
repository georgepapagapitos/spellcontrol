services:
  postgres:
    image: postgres:16-alpine
    container_name: spellcontrol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spellcontrol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: spellcontrol
    volumes:
      - spellcontrol-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spellcontrol -d spellcontrol']
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 256m
    cpus: 0.5

  backend:
    image: ghcr.io/georgepapagapitos/spellcontrol-backend:latest
    container_name: spellcontrol-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://spellcontrol:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/spellcontrol
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (32+ random chars)}
      NODE_ENV: production
      # Optional. Comma-separated usernames that the backend promotes to admin
      # on boot. Empty by default — set in .env to enable the admin panel.
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
      # Give V8 enough old-space to slim and gzip the Scryfall oracle bulk
      # without OOM-ing. Stays well under the cgroup mem_limit so the kernel
      # never kills the process before V8 gets to recover.
      NODE_OPTIONS: --max-old-space-size=1536
    # Backend is no longer exposed to the host — the frontend container's
    # nginx proxies /api/ to it on the docker-compose network.
    expose:
      - '3737'
    volumes:
      - spellcontrol-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
    # The first build of the Scryfall oracle bulk briefly peaks ~1GB while it
    # streams in, slims, and gzips ~200MB of JSON. Subsequent boots reuse the
    # persisted blob and idle around 200-300MB. 2g leaves headroom for V8 +
    # native deps (better-sqlite3, pg).
    mem_limit: 2g
    cpus: 0.5

  frontend:
    image: ghcr.io/georgepapagapitos/spellcontrol-frontend:latest
    container_name: spellcontrol-frontend
    restart: unless-stopped
    ports:
      - '8088:80'
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'
    mem_limit: 64m
    cpus: 0.25
    depends_on:
      - backend

volumes:
  spellcontrol-data:
  spellcontrol-postgres:
